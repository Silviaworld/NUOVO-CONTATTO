    // 洗牌算法乱序
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex != 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    let dataset = shuffle([...rawDataset]);
    let historyStack = []; // 记录历史访问索引的路径
    let currentIndexInDataset = -1; // 当前在乱序数组中的位置
    let clickState = 0;

    function updateProgress() {
        const progressText = document.getElementById("progress-text");
        let displayedIndex = historyStack.length;
        if (currentIndexInDataset === -1) displayedIndex = 0;
        progressText.innerText = `进度: ${displayedIndex} / ${rawDataset.length}`;
    }

    function renderCard(card) {
        const displayText = document.getElementById("display-text");
        const detailsBox = document.getElementById("details-box");
        
        // 50% 概率先出意语，50% 概率先出中文
        card.showItFirst = Math.random() < 0.5;
        
        if (card.showItFirst) {
            displayText.innerText = card.it;
            displayText.className = "word";
        } else {
            displayText.innerText = card.cn;
            displayText.className = "translation";
        }
        
        detailsBox.style.display = "none";
        clickState = 0;
        updateProgress();
        
        // 控制上一张按钮的置灰逻辑
        document.getElementById("prev-btn").disabled = (historyStack.length <= 1);
    }

    function nextCard() {
        // 如果是全新开始，或者已经走到当前探索的最前端
        if (currentIndexInDataset === -1 || currentIndexInDataset === historyStack.length - 1) {
            
            // 如果所有词汇都过了一遍，重新洗牌
            if (historyStack.length >= dataset.length) {
                alert("🎉 太棒了！第四单元所有 106 个词汇已经全部不重复地过了一遍！现在开启新一轮测试。");
                dataset = shuffle([...rawDataset]);
                historyStack = [];
                currentIndexInDataset = -1;
            }
            
            currentIndexInDataset++;
            historyStack.push(currentIndexInDataset);
        } else {
            // 如果处于“回溯”状态中，点击下一张只是往右移动历史指针
            currentIndexInDataset++;
        }
        
        const currentCardData = dataset[historyStack[currentIndexInDataset]];
        renderCard(currentCardData);
    }

    function prevCard() {
        if (currentIndexInDataset > 0) {
            currentIndexInDataset--;
            const currentCardData = dataset[historyStack[currentIndexInDataset]];
            renderCard(currentCardData);
        }
    }

    function handleCardClick() {
        if (currentIndexInDataset === -1) {
            nextCard();
            return;
        }
        
        const currentCardData = dataset[historyStack[currentIndexInDataset]];
        const displayText = document.getElementById("display-text");
        const detailsBox = document.getElementById("details-box");
        
        if (clickState === 0) {
            // 点击正面，展开中意双显和老师专属考点批注
            displayText.innerHTML = `<span class="word">${currentCardData.it}</span><br><span style="font-size:16px;color:#95a5a6;line-height:1.8;">➔</span><br><span class="translation">${currentCardData.cn}</span>`;
            detailsBox.innerHTML = currentCardData.tip;
            detailsBox.style.display = "block";
            clickState = 1;
        }
    }
